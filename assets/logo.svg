<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="bar1g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bar2g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="bar3g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:0.7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Leaf / eco accent -->
  <ellipse cx="93" cy="35" rx="13" ry="8" fill="#4ade80" opacity="0.9" transform="rotate(-35 93 35)"/>
  <line x1="93" y1="35" x2="85" y2="55" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Bar chart — 3 bars -->
  <!-- Bar 3 (tallest, left) -->
  <rect x="22" y="38" width="22" height="58" rx="5" fill="url(#bar1g)"/>
  <!-- Bar 2 (medium, center) -->
  <rect x="53" y="55" width="22" height="41" rx="5" fill="url(#bar2g)"/>
  <!-- Bar 1 (shortest, right) -->
  <rect x="84" y="68" width="22" height="28" rx="5" fill="url(#bar3g)"/>

  <!-- Baseline -->
  <rect x="18" y="98" width="92" height="4" rx="2" fill="white" opacity="0.4"/>
</svg>
